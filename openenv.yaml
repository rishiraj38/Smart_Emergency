name: eme_enviro
version: "1.0.0"
description: >
  A disaster management reinforcement learning environment where agents manage
  emergency dispatch. Agents must triage incoming 911 calls, classify severity,
  and dispatch limited resources (Police, Fire, Ambulance) across a smart city grid.

author: "OpenEnv Developer"
license: "MIT"

tags:
  - openenv
  - disaster-management
  - smart-city
  - dispatch
  - rl

tasks:
  - id: 1
    name: "Basic Triage"
    difficulty: easy
    description: "Focus on correctly classifying incoming calls. Minimal dispatch required."
    reward_max: 1.0

  - id: 2
    name: "Resource Management"
    difficulty: medium
    description: "Handle triage and dispatch with moderate call volume and limited vehicles."
    reward_max: 1.0

  - id: 3
    name: "Disaster Response"
    difficulty: hard
    description: "Full-scale disaster response with cascading events and high-pressure triage."
    reward_max: 1.0

endpoints:
  reset:    "POST /reset"
  step:     "POST /step"
  state:    "GET  /state"
  health:   "GET  /health"
  tasks:    "GET  /tasks"
  grader:   "POST /grader"    
  baseline: "GET  /baseline"

observation_space:
  current_call_id:   string
  transcript:        string
  active_events:     array
  resources:         array
  step:              integer
  calls_remaining:   integer
  cases_resolved:    integer
  reward:            float
  cumulative_reward: float
  done:              boolean

action_space:
  command:
    type: string
    values: [CLASSIFY, MERGE, ESCALATE, DISCARD, DISPATCH, REROUTE, HOLD, RECALL, WAIT]
  event_id:
    type: string
  vehicle_id:
    type: string
  severity:
    type: string
    values: [NORMAL, SEMI_CRITICAL, CRITICAL]

deployment:
  framework: fastapi
  python: "3.11"
  port: 7860
  app: server.app:app
