name: Push OpenEnv Environment to Hugging Face

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  push-openenv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OpenEnv CLI
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/meta-pytorch/OpenEnv.git"

      - name: Ensure HF token secret exists
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Missing HF_TOKEN secret. Add it in GitHub Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Push environment to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          openenv push -r rishi38/smart_emergency
